{% extends 'base.html' %}
{% block content %}

<div class="result-container">

    <div class="result-card">

        <h2 class="result-title">
            Predicted Water Scarcity Level
        </h2>

        <div class="prediction-box">
            <h1 class="prediction-text">
                {{ prediction }}
            </h1>

            <p class="confidence-text">
                Model Confidence: <span>{{ confidence }}%</span>
            </p>
        </div>

        <div class="divider"></div>

        <a href="{{ url_for('predict') }}" class="predict-btn">
            Predict Again
        </a>

    </div>

</div>

<style>

/* Page center layout */

.result-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:70vh;
}

/* Main result card */

.result-card{
    background: linear-gradient(145deg,#0f172a,#020617);
    border-radius:18px;
    padding:50px;
    max-width:520px;
    width:100%;
    text-align:center;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.05);

    animation:fadeUp 0.8s ease;
}

/* Title */

.result-title{
    font-size:26px;
    font-weight:600;
    margin-bottom:30px;
    color:#e2e8f0;
}

/* Prediction text */

.prediction-text{
    font-size:48px;
    font-weight:800;
    color:#00e5ff;
    letter-spacing:1px;
}

/* Confidence styling */

.confidence-text{
    margin-top:12px;
    font-size:16px;
    color:#94a3b8;
}

.confidence-text span{
    color:#38bdf8;
    font-weight:600;
}

/* Divider */

.divider{
    height:1px;
    background:linear-gradient(to right,transparent,#334155,transparent);
    margin:35px 0;
}

/* Predict button */

.predict-btn{
    display:inline-block;
    width:100%;
    padding:14px;

    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    font-size:16px;

    color:white;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    transition:all 0.3s ease;
}

.predict-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,114,255,0.5);
}

/* Animation */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

{% endblock %}
